<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fucking Miners — Terminal Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #0d0d0d;
            --bg-dark: #080808;
            --bg-light: #151515;
            --bg-highlight: #1a1a1a;
            --text: #e0e0e0;
            --text-dim: #555555;
            --text-bright: #cccccc;
            --accent: #808080;
            --accent-hover: #999999;
            --online: #66bb6a;
            --offline: #444444;
            --mention: #ff9800;
            --border: #222222;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
        }
        
        body {
            font-family: var(--font-mono);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        .app {
            display: grid;
            grid-template-columns: 200px 1fr 220px;
            grid-template-rows: 32px 1fr;
            height: 100vh;
            overflow: hidden;
        }
        
        .top-bar {
            grid-column: 1 / -1;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            font-size: 12px;
        }
        
        .logo {
            color: var(--text);
            font-weight: 600;
            font-size: 14px;
        }
        
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 4px;
        }
        
        .user-info:hover {
            background: var(--bg-highlight);
        }
        
        .user-avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #000;
        }
        
        .user-name {
            font-size: 12px;
        }
        
        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            font-family: var(--font-mono);
        }
        
        .logout-btn:hover {
            background: var(--bg-highlight);
            color: var(--text);
        }
        
        .sidebar-left {
            background: var(--bg-dark);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .nav-section {
            padding: 8px;
        }
        
        .nav-title {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            margin-bottom: 4px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .nav-item:hover {
            background: var(--bg-highlight);
        }
        
        .nav-item.active {
            background: var(--bg-light);
        }
        
        .chat-main {
            display: flex;
            flex-direction: column;
            background: var(--bg);
            overflow: hidden;
            position: relative;
        }
        
        .chat-header {
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .chat-stream-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 80px;
        }
        
        .message {
            margin-bottom: 12px;
            padding: 10px 12px;
            background: var(--bg-light);
            border-radius: 6px;
            border-left: 3px solid var(--accent);
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        
        .message-author {
            font-weight: 600;
            color: var(--accent);
            font-size: 13px;
        }
        
        .message-time {
            font-size: 11px;
            color: var(--text-dim);
        }
        
        .message-text {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-bright);
        }
        
        .input-area {
            position: sticky;
            bottom: 0;
            background: var(--bg-dark);
            border-top: 1px solid var(--border);
            padding: 10px 15px;
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .input-wrapper textarea {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 10px;
            resize: none;
            min-height: 60px;
        }
        
        .input-wrapper textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .send-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .send-btn:hover {
            background: var(--accent-hover);
        }
        
        .sidebar-right {
            background: var(--bg-dark);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .users-header {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
        }
        
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .user-item:hover {
            background: var(--bg-highlight);
        }
        
        .user-avatar-small {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #000;
        }
        
        .user-name-small {
            font-size: 12px;
        }
        
        .user-status-small {
            font-size: 10px;
            color: var(--online);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--online);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex !important;
        }
        
        .modal-content {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 30px;
            width: 400px;
            max-width: 90%;
        }
        
        .modal-title {
            text-align: center;
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--text);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 13px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-submit:hover {
            background: var(--accent-hover);
        }
        
        .modal-footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: var(--text-dim);
        }
        
        .modal-footer a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .error {
            color: #f44;
            text-align: center;
            margin: 10px 0;
            font-size: 12px;
        }
        
        .connection-status {
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--online);
        }
        
        .status-indicator.error {
            background: #f44;
        }
        
        .empty-state {
            text-align: center;
            color: var(--text-dim);
            padding: 50px;
            font-size: 13px;
        }
        
        @media (max-width: 1024px) {
            .app {
                grid-template-columns: 1fr;
            }
            .sidebar-left, .sidebar-right {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="logo">⚡ Fucking Miners</div>
            <div class="top-bar-right">
                <div class="connection-status" id="connectionStatus">
                    <span class="status-indicator"></span>
                    <span>Подключено</span>
                </div>
                <div class="user-info" id="userInfoBox">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <div class="user-name" id="userName">Гость</div>
                </div>
                <button class="logout-btn" id="logoutBtn" style="display: none;">Выход</button>
            </div>
        </div>
        
        <div class="sidebar-left">
            <div class="nav-section">
                <div class="nav-title">Навигация</div>
                <div class="nav-item active">
                    <span>📋</span>
                    <span>Все сообщения</span>
                </div>
            </div>
        </div>
        
        <div class="chat-main">
            <div class="chat-header">
                <div class="chat-stream-name">#fucking-miners</div>
            </div>
            
            <div class="messages-container" id="messages">
                <div class="empty-state">Загрузка сообщений...</div>
            </div>
            
            <div class="input-area" id="inputArea" style="display: none;">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Напишите сообщение..." rows="2"></textarea>
                    <button class="send-btn" onclick="sendMessage()">Отправить</button>
                </div>
            </div>
        </div>
        
        <div class="sidebar-right">
            <div class="users-header">
                Пользователи
                <span id="onlineCount">(0)</span>
            </div>
            <div class="users-list" id="usersList"></div>
        </div>
    </div>
    
    <div class="modal" id="authModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Вход в чат</div>
            <div class="error" id="authError" style="display: none;"></div>
            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="authUsername" placeholder="Ваш ник" required autofocus>
                </div>
                <div class="form-group">
                    <label>Пароль (опционально)</label>
                    <input type="password" id="authPassword" placeholder="Пароль">
                </div>
                <button type="submit" class="btn-submit" id="authButton">Войти</button>
            </form>
            <div class="modal-footer">
                <span id="modalSwitch">Нет аккаунта? <a href="#" onclick="switchAuth()">Регистрация</a></span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://95.140.148.73:5004/api';
        let currentUser = null;
        let lastMessages = [];
        let lastUsers = {};
        let pollInterval = null;
        
        // Init
        async function init() {
            console.log('=== INIT ===');
            
            // Check saved user
            const savedUser = localStorage.getItem('fm_currentUser');
            console.log('Saved user:', savedUser);
            
            if (savedUser) {
                currentUser = savedUser;
                await syncUser();
                showChat();
                startPolling();
            } else {
                showAuthModal();
            }
            
            await loadMessages();
            await loadUsers();
            
            console.log('=== INIT COMPLETE ===');
        }
        
        // Show auth modal
        function showAuthModal() {
            console.log('Showing auth modal');
            document.getElementById('authModal').classList.add('active');
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';
        }
        
        // Hide auth modal
        function hideAuthModal() {
            console.log('Hiding auth modal');
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('inputArea').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'block';
        }
        
        // Show chat
        function showChat() {
            console.log('Showing chat for:', currentUser);
            hideAuthModal();
            updateUserUI();
        }
        
        // Update user UI
        function updateUserUI() {
            if (currentUser) {
                document.getElementById('userName').textContent = currentUser;
                document.getElementById('userAvatar').textContent = currentUser[0].toUpperCase();
            }
        }
        
        // API calls
        async function apiGet(endpoint) {
            try {
                const response = await fetch(API_URL + endpoint);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }
        
        async function apiPost(endpoint, data) {
            try {
                const response = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }
        
        // Sync user
        async function syncUser() {
            if (!currentUser) return;
            await apiPost('/users', { username: currentUser, online: true });
        }
        
        // Load messages
        async function loadMessages() {
            const messages = await apiGet('/messages');
            if (messages && JSON.stringify(messages) !== JSON.stringify(lastMessages)) {
                lastMessages = messages;
                renderMessages(messages);
            }
        }
        
        // Render messages
        function renderMessages(messages) {
            const container = document.getElementById('messages');
            
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет сообщений. Начни первым!</div>';
                return;
            }
            
            let html = '';
            let lastUser = null;
            
            messages.forEach((msg, i) => {
                const time = new Date(msg.time).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                
                if (msg.user !== lastUser) {
                    if (i > 0) html += '</div>';
                    html += `
                        <div class="message">
                            <div class="message-header">
                                <span class="message-author">${msg.user}</span>
                                <span class="message-time">${time}</span>
                            </div>
                            <div class="message-text">${escapeHtml(msg.text)}</div>
                    `;
                } else {
                    html += `<div class="message" style="margin-top: 4px; padding: 8px 12px; background: var(--bg-light);"><div class="message-text">${escapeHtml(msg.text)}</div></div>`;
                }
                lastUser = msg.user;
            });
            
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Send message
        async function sendMessage() {
            if (!currentUser) {
                showAuthModal();
                return;
            }
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            const result = await apiPost('/messages', {
                user: currentUser,
                text: text,
                time: Date.now()
            });
            
            if (result) {
                input.value = '';
                await loadMessages();
            }
        }
        
        // Load users
        async function loadUsers() {
            const users = await apiGet('/users');
            if (users && JSON.stringify(users) !== JSON.stringify(lastUsers)) {
                lastUsers = users;
                renderUsers(users);
            }
        }
        
        // Render users
        function renderUsers(users) {
            const list = document.getElementById('usersList');
            const onlineUsers = Object.keys(users).filter(u => users[u].online);
            
            document.getElementById('onlineCount').textContent = `(${onlineUsers.length})`;
            
            list.innerHTML = onlineUsers.map(user => {
                const u = users[user];
                const avatar = u.avatar || user[0];
                return `
                    <div class="user-item">
                        <div class="user-avatar-small">${avatar}</div>
                        <div class="user-name-small">${user}</div>
                        <div class="status-dot"></div>
                    </div>
                `;
            }).join('');
        }
        
        // Auth
        function switchAuth() {
            const title = document.getElementById('modalTitle');
            const button = document.getElementById('authButton');
            const switchText = document.getElementById('modalSwitch');
            
            if (title.textContent === 'Вход в чат') {
                title.textContent = 'Регистрация';
                button.textContent = 'Создать аккаунт';
                switchText.innerHTML = 'Уже есть аккаунт? <a href="#" onclick="switchAuth()">Войти</a>';
            } else {
                title.textContent = 'Вход в чат';
                button.textContent = 'Войти';
                switchText.innerHTML = 'Нет аккаунта? <a href="#" onclick="switchAuth()">Регистрация</a>';
            }
        }
        
        async function handleAuth(e) {
            e.preventDefault();
            
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value || 'default';
            const isRegister = document.getElementById('modalTitle').textContent === 'Регистрация';
            const errorDiv = document.getElementById('authError');
            const hashedPassword = hashCode(password);
            
            console.log('Auth attempt:', { username, isRegister });
            
            if (!username || username.length < 2) {
                errorDiv.textContent = 'Минимум 2 символа';
                errorDiv.style.display = 'block';
                return;
            }
            
            errorDiv.style.display = 'none';
            
            const users = await apiGet('/users');
            
            if (isRegister) {
                // Register
                if (users && users[username]) {
                    errorDiv.textContent = 'Пользователь уже существует';
                    errorDiv.style.display = 'block';
                    return;
                }
                
                await apiPost('/users', { username, password: hashedPassword, online: true });
                
                currentUser = username;
                localStorage.setItem('fm_currentUser', username);
                showChat();
                startPolling();
                
            } else {
                // Login
                if (!users || !users[username]) {
                    errorDiv.textContent = 'Пользователь не найден';
                    errorDiv.style.display = 'block';
                    return;
                }
                
                const storedPassword = users[username].password;
                
                if (storedPassword && storedPassword !== hashedPassword) {
                    errorDiv.textContent = 'Неверный пароль';
                    errorDiv.style.display = 'block';
                    return;
                }
                
                if (!storedPassword) {
                    await apiPost('/users', { username, password: hashedPassword, online: true });
                } else {
                    await apiPost(`/users/${username}/online`, { online: true });
                }
                
                currentUser = username;
                localStorage.setItem('fm_currentUser', username);
                showChat();
                startPolling();
            }
        }
        
        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
            }
            return hash.toString();
        }
        
        function logout() {
            if (currentUser) {
                apiPost(`/users/${currentUser}/online`, { online: false });
            }
            currentUser = null;
            localStorage.removeItem('fm_currentUser');
            stopPolling();
            showAuthModal();
        }
        
        // Polling
        function startPolling() {
            pollInterval = setInterval(async () => {
                await loadMessages();
                await loadUsers();
            }, 1000);
        }
        
        function stopPolling() {
            if (pollInterval) clearInterval(pollInterval);
        }
        
        // Enter to send
        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Start
        init();
    </script>
</body>
</html>
