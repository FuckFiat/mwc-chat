<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fucking Miners — Terminal Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #0d0d0d;
            --bg-dark: #080808;
            --bg-light: #151515;
            --bg-highlight: #1a1a1a;
            --text: #e0e0e0;
            --text-dim: #555555;
            --text-bright: #cccccc;
            --accent: #888888;
            --accent-hover: #aaaaaa;
            --online: #66bb6a;
            --offline: #444444;
            --mention: #ff9800;
            --border: #222222;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
        }
        
        body {
            font-family: var(--font-mono);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
        
        .top-bar {
            flex-shrink: 0;
            height: 32px;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            font-size: 12px;
        }
        
        .logo {
            color: var(--text);
            font-weight: 600;
            font-size: 13px;
        }
        
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .connection-status {
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--online);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .user-info:hover {
            background: var(--bg-highlight);
        }
        
        .user-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: #000;
        }
        
        .user-name {
            font-size: 11px;
        }
        
        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            font-family: var(--font-mono);
        }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            min-height: 0;
            overflow: hidden;
        }
        
        .chat-header {
            flex-shrink: 0;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            padding: 6px 10px;
        }
        
        .chat-stream-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .input-area {
            background: var(--bg-dark);
            border-top: 1px solid var(--border);
            padding: 8px 10px;
        }
        
        .message {
            margin-bottom: 10px;
            padding: 8px 10px;
            background: var(--bg-light);
            border-radius: 4px;
            border-left: 2px solid var(--accent);
        }
        
        .message-author {
            font-weight: 600;
            font-size: 12px;
        }
        
        .message-time {
            font-size: 10px;
            color: var(--text-dim);
        }
        
        /* User colors - light dark tones */
        .user-color-0 { color: #a8d8ea; } /* Light blue */
        .user-color-1 { color: #aa96da; } /* Light purple */
        .user-color-2 { color: #fcbad3; } /* Light pink */
        .user-color-3 { color: #a8e6cf; } /* Light green */
        .user-color-4 { color: #ffd3b6; } /* Light orange */
        .user-color-5 { color: #dcedc1; } /* Light lime */
        .user-color-6 { color: #c9b1ff; } /* Light violet */
        .user-color-7 { color: #b5ead7; } /* Light mint */
        .user-color-8 { color: #ffc6ff; } /* Light magenta */
        .user-color-9 { color: #bdb2ff; } /* Light indigo */
        
        .msg-color-0 { border-left-color: #a8d8ea; background: rgba(168, 216, 234, 0.05); }
        .msg-color-1 { border-left-color: #aa96da; background: rgba(170, 150, 218, 0.05); }
        .msg-color-2 { border-left-color: #fcbad3; background: rgba(252, 186, 211, 0.05); }
        .msg-color-3 { border-left-color: #a8e6cf; background: rgba(168, 230, 207, 0.05); }
        .msg-color-4 { border-left-color: #ffd3b6; background: rgba(255, 211, 182, 0.05); }
        .msg-color-5 { border-left-color: #dcedc1; background: rgba(220, 237, 193, 0.05); }
        .msg-color-6 { border-left-color: #c9b1ff; background: rgba(201, 177, 255, 0.05); }
        .msg-color-7 { border-left-color: #b5ead7; background: rgba(181, 234, 215, 0.05); }
        .msg-color-8 { border-left-color: #ffc6ff; background: rgba(255, 198, 255, 0.05); }
        .msg-color-9 { border-left-color: #bdb2ff; background: rgba(189, 178, 255, 0.05); }
        
        .message-text {
            font-size: 12px;
            line-height: 1.5;
            color: var(--text-bright);
            word-wrap: break-word;
        }
        
        .empty-state {
            text-align: center;
            color: var(--text-dim);
            padding: 30px;
            font-size: 12px;
        }
        
        .input-area {
            background: var(--bg-dark);
            border-top: 1px solid var(--border);
            padding: 8px 10px;
        }
        
        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }
        
        .input-wrapper textarea {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 12px;
            padding: 8px;
            resize: none;
            min-height: 36px;
            max-height: 100px;
        }
        
        .input-wrapper textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .send-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .send-btn:hover {
            background: var(--accent-hover);
        }
        
        .sidebar-left, .sidebar-right {
            display: none;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex !important;
        }
        
        .modal-content {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            width: 90%;
            max-width: 350px;
        }
        
        .modal-title {
            text-align: center;
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--text);
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        
        .form-group input {
            width: 100%;
            padding: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 12px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn-submit {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-submit:hover {
            background: var(--accent-hover);
        }
        
        .modal-footer {
            text-align: center;
            margin-top: 12px;
            font-size: 11px;
            color: var(--text-dim);
        }
        
        .modal-footer a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .error {
            color: #f44;
            text-align: center;
            margin: 8px 0;
            font-size: 11px;
        }
        
        @media (min-width: 1024px) {
            .app {
                display: grid;
                grid-template-columns: 180px 1fr 200px;
                grid-template-rows: 32px 1fr;
            }
            
            .sidebar-left, .sidebar-right {
                display: flex;
                flex-direction: column;
            }
            
            .sidebar-left {
                background: var(--bg-dark);
                border-right: 1px solid var(--border);
            }
            
            .sidebar-right {
                background: var(--bg-dark);
                border-left: 1px solid var(--border);
            }
            
            .nav-section {
                padding: 6px;
            }
            
            .nav-title {
                font-size: 9px;
                color: var(--text-dim);
                text-transform: uppercase;
                letter-spacing: 1px;
                padding: 4px 8px;
                margin-bottom: 4px;
            }
            
            .nav-item {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 5px 8px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 11px;
            }
            
            .nav-item:hover {
                background: var(--bg-highlight);
            }
            
            .nav-item.active {
                background: var(--bg-light);
            }
            
            .streams {
                flex: 1;
                overflow-y: auto;
                padding: 6px;
            }
            
            .stream-item {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 5px 8px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 11px;
            }
            
            .stream-item:hover {
                background: var(--bg-highlight);
            }
            
            .stream-item.active {
                background: var(--bg-light);
            }
            
            .stream-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--accent);
            }
            
            .users-header {
                padding: 8px 10px;
                border-bottom: 1px solid var(--border);
                font-size: 11px;
                font-weight: 600;
            }
            
            .users-list {
                flex: 1;
                overflow-y: auto;
                padding: 6px;
            }
            
            .user-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 6px 8px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 11px;
            }
            
            .user-item:hover {
                background: var(--bg-highlight);
            }
            
            .user-avatar-small {
                width: 24px;
                height: 24px;
                border-radius: 50%;
                background: var(--accent);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 10px;
                font-weight: 600;
                color: #000;
            }
            
            .user-name-small {
                font-size: 11px;
            }
            
            .status-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--online);
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="logo">⚡ Fucking Miners</div>
            <div class="top-bar-right">
                <div class="connection-status" id="connectionStatus">
                    <span class="status-indicator"></span>
                    <span>Подключено</span>
                </div>
                <div class="user-info" id="userInfoBox">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <div class="user-name" id="userName">Гость</div>
                </div>
                <button class="logout-btn" id="logoutBtn" style="display: none;">Выход</button>
            </div>
        </div>
        
        <div class="sidebar-left">
            <div class="nav-section">
                <div class="nav-title">Навигация</div>
                <div class="nav-item active">
                    <span>📋</span>
                    <span>Все сообщения</span>
                </div>
            </div>
        </div>
        
        <div class="chat-main">
            <div class="chat-header">
                <div class="chat-stream-name">#fucking-miners</div>
            </div>
            <div class="messages-container" id="messages">
                <div class="empty-state">Загрузка...</div>
            </div>
            <div class="input-area" id="inputArea" style="display: none;">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Сообщение..." rows="1"></textarea>
                    <button class="send-btn" onclick="sendMessage()">→</button>
                </div>
            </div>
        </div>
        
        <div class="sidebar-right">
            <div class="users-header">
                Пользователи
                <span id="onlineCount">(0)</span>
            </div>
            <div class="users-list" id="usersList"></div>
        </div>
    </div>
    
    <div class="modal" id="authModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Вход</div>
            <div class="error" id="authError" style="display: none;"></div>
            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label>Ник</label>
                    <input type="text" id="authUsername" placeholder="Ваш ник" required autofocus>
                </div>
                <div class="form-group">
                    <label>Пароль (опционально)</label>
                    <input type="password" id="authPassword" placeholder="Пароль">
                </div>
                <button type="submit" class="btn-submit" id="authButton">Войти</button>
            </form>
            <div class="modal-footer">
                <span id="modalSwitch">Нет аккаунта? <a href="#" onclick="switchAuth()">Регистрация</a></span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://95.140.148.73:5004/api';
        let currentUser = null;
        let lastMessages = [];
        let lastUsers = {};
        let pollInterval = null;
        
        async function init() {
            const savedUser = localStorage.getItem('fm_currentUser');
            if (savedUser) {
                currentUser = savedUser;
                await syncUser();
                showChat();
                startPolling();
            } else {
                showAuthModal();
            }
            await loadMessages();
            await loadUsers();
        }
        
        function showAuthModal() {
            document.getElementById('authModal').classList.add('active');
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('userInfoBox').style.display = 'flex';
        }
        
        function hideAuthModal() {
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('inputArea').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'block';
        }
        
        function showChat() {
            hideAuthModal();
            updateUserUI();
        }
        
        function updateUserUI() {
            if (currentUser) {
                document.getElementById('userName').textContent = currentUser;
                document.getElementById('userAvatar').textContent = currentUser[0].toUpperCase();
            }
        }
        
        async function apiGet(endpoint) {
            try {
                const response = await fetch(API_URL + endpoint);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }
        
        async function apiPost(endpoint, data) {
            try {
                const response = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }
        
        async function syncUser() {
            if (!currentUser) return;
            await apiPost('/users', { username: currentUser, online: true });
        }
        
        async function loadMessages() {
            const messages = await apiGet('/messages');
            if (messages && JSON.stringify(messages) !== JSON.stringify(lastMessages)) {
                lastMessages = messages;
                renderMessages(messages);
            }
        }
        
        function renderMessages(messages) {
            const container = document.getElementById('messages');
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет сообщений</div>';
                return;
            }
            
            // Build user color map
            const userColors = {};
            let colorIndex = 0;
            messages.forEach(m => {
                if (!userColors[m.user]) {
                    userColors[m.user] = colorIndex % 10;
                    colorIndex++;
                }
            });
            
            let html = '';
            let lastUser = null;
            
            messages.forEach((msg, i) => {
                const time = new Date(msg.time).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                const colorClass = userColors[msg.user];
                
                if (msg.user !== lastUser) {
                    if (i > 0) html += '</div>';
                    html += `<div class="message msg-color-${colorClass}"><div class="message-header"><span class="message-author user-color-${colorClass}">${msg.user}</span><span class="message-time">${time}</span></div><div class="message-text">${escapeHtml(msg.text)}</div>`;
                } else {
                    html += `<div class="message msg-color-${colorClass}" style="margin-top:4px;padding:6px 10px;background:var(--bg-light);"><div class="message-text">${escapeHtml(msg.text)}</div></div>`;
                }
                lastUser = msg.user;
            });
            
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function sendMessage() {
            if (!currentUser) { showAuthModal(); return; }
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            await apiPost('/messages', { user: currentUser, text: text, time: Date.now() });
            input.value = '';
            await loadMessages();
        }
        
        async function loadUsers() {
            const users = await apiGet('/users');
            if (users && JSON.stringify(users) !== JSON.stringify(lastUsers)) {
                lastUsers = users;
                renderUsers(users);
            }
        }
        
        function renderUsers(users) {
            const list = document.getElementById('usersList');
            const onlineUsers = Object.keys(users).filter(u => users[u].online);
            document.getElementById('onlineCount').textContent = `(${onlineUsers.length})`;
            list.innerHTML = onlineUsers.map(u => `<div class="user-item"><div class="user-avatar-small">${users[u].avatar||u[0]}</div><div class="user-name-small">${u}</div><div class="status-dot"></div></div>`).join('');
        }
        
        function switchAuth() {
            const t = document.getElementById('modalTitle');
            const b = document.getElementById('authButton');
            const s = document.getElementById('modalSwitch');
            if (t.textContent === 'Вход') {
                t.textContent = 'Регистрация';
                b.textContent = 'Создать';
                s.innerHTML = 'Есть аккаунт? <a href="#" onclick="switchAuth()">Войти</a>';
            } else {
                t.textContent = 'Вход';
                b.textContent = 'Войти';
                s.innerHTML = 'Нет аккаунта? <a href="#" onclick="switchAuth()">Регистрация</a>';
            }
        }
        
        async function handleAuth(e) {
            e.preventDefault();
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value || 'default';
            const isRegister = document.getElementById('modalTitle').textContent === 'Регистрация';
            const errorDiv = document.getElementById('authError');
            const hash = hashCode(password);
            
            if (!username || username.length < 2) {
                errorDiv.textContent = 'Минимум 2 символа';
                errorDiv.style.display = 'block';
                return;
            }
            errorDiv.style.display = 'none';
            
            const users = await apiGet('/users');
            
            if (isRegister) {
                if (users && users[username]) {
                    errorDiv.textContent = 'Уже существует';
                    errorDiv.style.display = 'block';
                    return;
                }
                await apiPost('/users', { username, password: hash, online: true });
                currentUser = username;
                localStorage.setItem('fm_currentUser', username);
                showChat();
                startPolling();
            } else {
                if (!users || !users[username]) {
                    errorDiv.textContent = 'Не найден';
                    errorDiv.style.display = 'block';
                    return;
                }
                if (users[username].password && users[username].password !== hash) {
                    errorDiv.textContent = 'Неверный пароль';
                    errorDiv.style.display = 'block';
                    return;
                }
                if (!users[username].password) {
                    await apiPost('/users', { username, password: hash, online: true });
                } else {
                    await apiPost(`/users/${username}/online`, { online: true });
                }
                currentUser = username;
                localStorage.setItem('fm_currentUser', username);
                showChat();
                startPolling();
            }
        }
        
        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = ((hash << 5) - hash) + str.charCodeAt(i);
            return hash.toString();
        }
        
        function logout() {
            if (currentUser) apiPost(`/users/${currentUser}/online`, { online: false });
            currentUser = null;
            localStorage.removeItem('fm_currentUser');
            if (pollInterval) clearInterval(pollInterval);
            showAuthModal();
        }
        
        function startPolling() {
            pollInterval = setInterval(async () => { await loadMessages(); await loadUsers(); }, 1000);
        }
        
        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        
        init();
    </script>
</body>
</html>
