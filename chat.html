<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fucking Miners — Чат майнеров</title>
    <style>
        /* Theme variables */
        :root {
            /* Default: Cyberpunk */
            --bg: #0a0a0a;
            --bg-card: #111111;
            --bg-input: #0a0a0a;
            --text: #ffffff;
            --text-dim: #888888;
            --accent: #FFD700;
            --accent-alt: #FFA500;
            --online: #4caf50;
            --border: rgba(255, 215, 0, 0.1);
            --message-bg: transparent;
            --author-color: #FFD700;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
        }
        
        [data-theme="terminal"] {
            --bg: #000000;
            --bg-card: #000000;
            --bg-input: #000000;
            --text: #00ff00;
            --text-dim: #008800;
            --accent: #00ff00;
            --accent-alt: #00cc00;
            --online: #00ff00;
            --border: #003300;
            --message-bg: transparent;
            --author-color: #00ff00;
            --font-family: 'Courier New', 'Consolas', monospace;
        }
        
        [data-theme="minimal"] {
            --bg: #ffffff;
            --bg-card: #f8f8f8;
            --bg-input: #ffffff;
            --text: #333333;
            --text-dim: #888888;
            --accent: #0066ff;
            --accent-alt: #0044cc;
            --online: #00cc00;
            --border: #e0e0e0;
            --message-bg: #f8f8f8;
            --author-color: #0066ff;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        [data-theme="dark-purple"] {
            --bg: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #1a1a2e;
            --text: #eaeaea;
            --text-dim: #8892b0;
            --accent: #e94560;
            --accent-alt: #ff6b6b;
            --online: #4ecca3;
            --border: rgba(233, 69, 96, 0.2);
            --message-bg: #16213e;
            --author-color: #e94560;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        [data-theme="matrix"] {
            --bg: #000000;
            --bg-card: #001100;
            --bg-input: #000000;
            --text: #00ff00;
            --text-dim: #008800;
            --accent: #00ff00;
            --accent-alt: #00ff00;
            --online: #00ff00;
            --border: #003300;
            --message-bg: rgba(0, 255, 0, 0.05);
            --author-color: #00ff00;
            --font-family: 'Courier New', 'Consolas', monospace;
        }
        
        [data-theme="github"] {
            --bg: #0d1117;
            --bg-card: #161b22;
            --bg-input: #0d1117;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --accent-alt: #1f6feb;
            --online: #3fb950;
            --border: #30363d;
            --message-bg: #161b22;
            --author-color: #58a6ff;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }
        
        [data-theme="brutal"] {
            --bg: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --text: #000000;
            --text-dim: #666666;
            --accent: #000000;
            --accent-alt: #333333;
            --online: #00ff00;
            --border: #000000;
            --message-bg: #f0f0f0;
            --author-color: #000000;
            --font-family: 'Arial Black', 'Helvetica Neue', sans-serif;
        }
        
        [data-theme="terminal-pro"] {
            --bg: #1a1b26;
            --bg-card: #1a1b26;
            --bg-input: #1a1b26;
            --text: #a9b1d6;
            --text-dim: #565f89;
            --accent: #7aa2f7;
            --accent-alt: #7dcfff;
            --online: #9ece6a;
            --border: #292e42;
            --message-bg: #24283b;
            --author-color: #bb9af7;
            --font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* Theme bar */
        .theme-bar {
            background: var(--bg-card);
            border-bottom: 2px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .theme-btn {
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-family);
        }
        
        .theme-btn:hover, .theme-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        
        .theme-btn.active {
            font-weight: 600;
        }
        
        .container {
            display: flex;
            height: calc(100vh - 50px);
        }
        
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }
        
        .chat-header {
            padding: 15px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .chat-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--bg);
        }
        
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
            padding: 12px 15px;
            background: var(--message-bg);
            border-radius: 12px;
            border-left: 3px solid var(--accent);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        
        .message-author {
            font-weight: 700;
            color: var(--author-color);
            font-size: 14px;
        }
        
        .message-time {
            font-size: 11px;
            color: var(--text-dim);
        }
        
        .message-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text);
        }
        
        .message-input {
            padding: 15px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
        }
        
        .input-wrapper input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            font-size: 15px;
            font-family: var(--font-family);
            transition: all 0.2s;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }
        
        .btn-send {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            color: #000;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-family);
        }
        
        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }
        
        .online-panel {
            width: 280px;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
        }
        
        .online-header {
            padding: 18px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 14px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .online-count {
            font-size: 12px;
            color: var(--text-dim);
            margin-left: 8px;
        }
        
        .online-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        
        .online-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
        }
        
        .online-user:hover {
            background: rgba(255, 215, 0, 0.1);
        }
        
        .online-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #000;
            font-size: 16px;
        }
        
        .online-info {
            flex: 1;
        }
        
        .online-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .online-status {
            font-size: 12px;
            color: var(--online);
        }
        
        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--online);
            box-shadow: 0 0 8px var(--online);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .user-section {
            padding: 15px;
            border-top: 1px solid var(--border);
        }
        
        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .user-card:hover {
            background: rgba(255, 215, 0, 0.1);
        }
        
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #000;
            font-size: 18px;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .user-status {
            font-size: 12px;
            color: var(--online);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 35px;
            width: 420px;
            max-width: 90%;
            border: 2px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        .modal-title {
            text-align: center;
            font-size: 28px;
            margin-bottom: 25px;
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            font-size: 15px;
            font-family: var(--font-family);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn-submit {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            color: #000;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-family);
            font-size: 15px;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }
        
        .modal-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-dim);
            font-size: 14px;
        }
        
        .modal-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        
        .error {
            color: #ff4444;
            text-align: center;
            margin: 12px 0;
            font-size: 14px;
        }
        
        .connection-status {
            font-size: 12px;
            color: var(--online);
            font-weight: 600;
        }
        
        .connection-status.error {
            color: #ff4444;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
        
        @media (max-width: 768px) {
            .online-panel {
                display: none;
            }
            .theme-bar {
                justify-content: center;
            }
        }
        
        /* Matrix theme special */
        [data-theme="matrix"] .message {
            text-shadow: 0 0 5px var(--accent);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
        }
        
        [data-theme="matrix"] .online-dot {
            animation: pulse 1s infinite;
        }
        
        /* Brutal theme special */
        [data-theme="brutal"] .message {
            border-radius: 0;
            border: 2px solid #000;
            border-left: 4px solid #000;
        }
        
        [data-theme="brutal"] .btn-send {
            border-radius: 0;
            border: 2px solid #000;
        }
        
        [data-theme="brutal"] .modal-content {
            border-radius: 0;
            border: 3px solid #000;
        }
        
        /* Terminal Pro theme special - Zulip style */
        [data-theme="terminal-pro"] .container {
            display: grid;
            grid-template-columns: 200px 1fr 220px;
        }
        
        [data-theme="terminal-pro"] .main {
            border-right: none;
        }
        
        [data-theme="terminal-pro"] .theme-bar {
            border-bottom: 1px solid var(--border);
            padding: 8px 15px;
        }
        
        [data-theme="terminal-pro"] .theme-btn {
            padding: 6px 10px;
            font-size: 11px;
        }
        
        [data-theme="terminal-pro"] .chat-header {
            border-bottom: 1px solid var(--border);
            padding: 10px 15px;
        }
        
        [data-theme="terminal-pro"] .chat-title {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 14px;
        }
        
        [data-theme="terminal-pro"] .online-panel {
            width: 220px;
            border-left: 1px solid var(--border);
            border-right: none;
        }
        
        [data-theme="terminal-pro"] .online-header {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 12px;
            padding: 10px;
        }
        
        [data-theme="terminal-pro"] .message {
            padding: 8px 12px;
            margin-bottom: 4px;
            border-left: 3px solid var(--accent);
            background: var(--message-bg);
        }
        
        [data-theme="terminal-pro"] .message-author {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 13px;
        }
        
        [data-theme="terminal-pro"] .message-text {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 13px;
        }
        
        [data-theme="terminal-pro"] .online-user {
            padding: 8px;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 12px;
        }
        
        [data-theme="terminal-pro"] .online-avatar {
            width: 32px;
            height: 32px;
            font-size: 12px;
        }
        
        [data-theme="terminal-pro"] .online-name {
            font-size: 12px;
        }
        
        [data-theme="terminal-pro"] .online-status {
            font-size: 10px;
        }
        
        @media (max-width: 1024px) {
            [data-theme="terminal-pro"] .container {
                grid-template-columns: 1fr;
            }
            [data-theme="terminal-pro"] .online-panel {
                display: none;
            }
        }
    </style>
</head>
<body data-theme="cyberpunk">
    <div class="theme-bar">
        <button class="theme-btn active" onclick="setTheme('cyberpunk')">🤖 Cyberpunk</button>
        <button class="theme-btn" onclick="setTheme('terminal')">💻 Terminal</button>
        <button class="theme-btn" onclick="setTheme('minimal')">✨ Minimal</button>
        <button class="theme-btn" onclick="setTheme('dark-purple')">💜 Purple</button>
        <button class="theme-btn" onclick="setTheme('matrix')">🟢 Matrix</button>
        <button class="theme-btn" onclick="setTheme('github')">🐙 GitHub</button>
        <button class="theme-btn" onclick="setTheme('brutal')">⬛ Brutal</button>
        <button class="theme-btn" onclick="setTheme('terminal-pro')">🖥️ Terminal Pro</button>
        <button class="btn-send" onclick="logout()" style="padding: 8px 16px; font-size: 12px; margin-left: auto;">Выход</button>
    </div>
    
    <div class="container">
        <div class="main">
            <div class="chat-header">
                <div>
                    <div class="chat-title">#fucking-miners</div>
                </div>
                <span class="connection-status" id="connectionStatus">● Подключено</span>
            </div>
            
            <div class="messages" id="messages">
                <div style="text-align: center; color: var(--text-dim); padding: 50px;">
                    Загрузка сообщений...
                </div>
            </div>
            
            <div class="message-input">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Напишите сообщение..." onkeypress="handleKeyPress(event)">
                    <button class="btn-send" onclick="sendMessage()">→</button>
                </div>
            </div>
        </div>
        
        <div class="online-panel">
            <div class="online-header">
                Онлайн<span class="online-count" id="onlineCount">(0)</span>
            </div>
            <div class="online-list" id="onlineList"></div>
            <div class="user-section">
                <div class="user-card" onclick="logout()">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Гость</div>
                        <div class="user-status" id="userStatus">В сети</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Вход в чат</div>
            <div class="error" id="authError" style="display: none;"></div>
            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="authUsername" placeholder="Ваш ник" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="authPassword" placeholder="Пароль">
                </div>
                <button type="submit" class="btn-submit" id="authButton">Войти</button>
            </form>
            <div class="modal-footer">
                <span id="modalSwitch">Нет аккаунта? <a href="#" onclick="switchAuth()">Регистрация</a></span>
            </div>
        </div>
    </div>

    <script>
        // API URL - VPS server
        const API_URL = 'http://95.140.148.73:5004/api';
        
        // State
        let currentUser = null;
        let currentTheme = 'cyberpunk';
        let pollInterval = null;
        let lastMessages = [];
        let lastUsers = {};
        
        // Theme
        function setTheme(theme) {
            currentTheme = theme;
            document.body.dataset.theme = theme;
            localStorage.setItem('fm_theme', theme);
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function loadTheme() {
            const saved = localStorage.getItem('fm_theme');
            if (saved) {
                currentTheme = saved;
                document.body.dataset.theme = saved;
                document.querySelectorAll('.theme-btn').forEach(btn => {
                    if (btn.textContent.toLowerCase().includes(saved)) {
                        btn.classList.add('active');
                    }
                });
            }
        }
        
        // Initialize
        async function init() {
            console.log('=== INIT ===');
            loadTheme();
            
            const savedUser = localStorage.getItem('fm_currentUser');
            if (savedUser) {
                currentUser = savedUser;
                await syncUser();
                hideAuthModal();
                startPolling();
            } else {
                showAuthModal();
            }
            
            await loadMessages();
            await loadUsers();
            console.log('=== INIT COMPLETE ===');
        }
        
        // API Calls
        async function apiGet(endpoint) {
            try {
                const response = await fetch(`${API_URL}${endpoint}`);
                const status = document.getElementById('connectionStatus');
                status.textContent = '● Подключено';
                status.classList.remove('error');
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                const status = document.getElementById('connectionStatus');
                status.textContent = '● Ошибка соединения';
                status.classList.add('error');
                return null;
            }
        }
        
        async function apiPost(endpoint, data) {
            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }
        
        // Messages
        async function loadMessages() {
            const messages = await apiGet('/messages');
            if (messages && JSON.stringify(messages) !== JSON.stringify(lastMessages)) {
                lastMessages = messages;
                renderMessages(messages);
            }
        }
        
        async function sendMessage() {
            if (!currentUser) {
                showAuthModal();
                return;
            }
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            const result = await apiPost('/messages', {
                user: currentUser,
                text: text,
                time: Date.now()
            });
            
            if (result) {
                input.value = '';
                await loadMessages();
            }
        }
        
        function renderMessages(messages) {
            const container = document.getElementById('messages');
            
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 50px;">Нет сообщений. Начни первым!</div>';
                return;
            }
            
            container.innerHTML = messages.map(msg => {
                const time = new Date(msg.time).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                return `
                    <div class="message">
                        <div class="message-header">
                            <span class="message-author">${msg.user}</span>
                            <span class="message-time">${time}</span>
                        </div>
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                    </div>
                `;
            }).join('');
            
            // Smooth scroll to bottom
            const isScrolledToBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;
            if (isScrolledToBottom) {
                container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
        
        // Users
        async function loadUsers() {
            const users = await apiGet('/users');
            if (users && JSON.stringify(users) !== JSON.stringify(lastUsers)) {
                lastUsers = users;
                renderOnlineUsers(users);
            }
        }
        
        async function syncUser() {
            if (!currentUser) return;
            
            await apiPost('/users', {
                username: currentUser,
                online: true
            });
        }
        
        function renderOnlineUsers(users) {
            const list = document.getElementById('onlineList');
            const onlineUsers = Object.keys(users).filter(u => users[u].online);
            
            document.getElementById('onlineCount').textContent = `(${onlineUsers.length})`;
            
            list.innerHTML = onlineUsers.map(user => {
                const u = users[user];
                const avatar = u.avatar || user[0];
                return `
                    <div class="online-user">
                        <div class="online-avatar">${avatar}</div>
                        <div class="online-info">
                            <div class="online-name">${user}</div>
                            <div class="online-status">В сети</div>
                        </div>
                        <div class="online-dot"></div>
                    </div>
                `;
            }).join('');
        }
        
        // Auth
        function showAuthModal() {
            document.getElementById('authModal').classList.add('active');
        }
        
        function hideAuthModal() {
            document.getElementById('authModal').classList.remove('active');
        }
        
        function switchAuth() {
            const title = document.getElementById('modalTitle');
            const button = document.getElementById('authButton');
            const switchText = document.getElementById('modalSwitch');
            
            if (title.textContent === 'Вход в чат') {
                title.textContent = 'Регистрация';
                button.textContent = 'Создать аккаунт';
                switchText.innerHTML = 'Уже есть аккаунт? <a href="#" onclick="switchAuth()">Войти</a>';
            } else {
                title.textContent = 'Вход в чат';
                button.textContent = 'Войти';
                switchText.innerHTML = 'Нет аккаунта? <a href="#" onclick="switchAuth()">Регистрация</a>';
            }
        }
        
        async function handleAuth(e) {
            e.preventDefault();
            
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value || '123';
            const isRegister = document.getElementById('modalTitle').textContent === 'Регистрация';
            const errorDiv = document.getElementById('authError');
            
            if (!username) {
                errorDiv.textContent = 'Введите имя пользователя';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Check if user exists
            const users = await apiGet('/users');
            
            if (isRegister) {
                if (users && users[username]) {
                    errorDiv.textContent = 'Пользователь уже существует';
                    errorDiv.style.display = 'block';
                    return;
                }
                
                // Register
                await apiPost('/users', {
                    username: username,
                    password: hashCode(password),
                    online: true
                });
                
                currentUser = username;
                localStorage.setItem('fm_currentUser', username);
                
                hideAuthModal();
                await loadUsers();
                startPolling();
            } else {
                // Login
                if (!users || !users[username]) {
                    errorDiv.textContent = 'Пользователь не найден';
                    errorDiv.style.display = 'block';
                    return;
                }
                
                if (users[username].password !== hashCode(password)) {
                    errorDiv.textContent = 'Неверный пароль';
                    errorDiv.style.display = 'block';
                    return;
                }
                
                await apiPost(`/users/${username}/online`, { online: true });
                
                currentUser = username;
                localStorage.setItem('fm_currentUser', username);
                
                hideAuthModal();
                await loadUsers();
                startPolling();
            }
            
            updateUserUI();
        }
        
        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
            }
            return hash.toString();
        }
        
        function updateUserUI() {
            if (currentUser) {
                document.getElementById('userName').textContent = currentUser;
                document.getElementById('userAvatar').textContent = currentUser[0].toUpperCase();
            }
        }
        
        async function logout() {
            if (currentUser) {
                await apiPost(`/users/${currentUser}/online`, { online: false });
            }
            currentUser = null;
            localStorage.removeItem('fm_currentUser');
            stopPolling();
            showAuthModal();
        }
        
        // Polling
        function startPolling() {
            pollInterval = setInterval(async () => {
                await loadMessages();
                await loadUsers();
            }, 1000);
        }
        
        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
            }
        }
        
        // Init
        init();
    </script>
</body>
</html>
