<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWC Chat — Майнеры</title>
    <style>
        :root {
            /* Default: Dark theme */
            --bg: #0a0a0a;
            --bg-card: #111111;
            --bg-input: #0a0a0a;
            --text: #ffffff;
            --text-dim: #888888;
            --accent: #FFD700;
            --accent-alt: #FFA500;
            --online: #4caf50;
            --border: rgba(255, 215, 0, 0.1);
        }
        
        [data-theme="light"] {
            --bg: #f5f5f5;
            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --text: #1a1a1a;
            --text-dim: #666666;
            --accent: #FFD700;
            --accent-alt: #FFA500;
            --border: rgba(0, 0, 0, 0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Mono', 'Consolas', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* Theme selector */
        .theme-bar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .theme-label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        
        .theme-select {
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
        }
        
        .theme-select:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .container {
            display: flex;
            height: calc(100vh - 50px);
        }
        
        /* Main chat */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }
        
        .chat-header {
            padding: 15px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .chat-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
        }
        
        .chat-topic {
            font-size: 12px;
            color: var(--text-dim);
        }
        
        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--bg);
        }
        
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 3px;
        }
        
        .message-author {
            font-weight: 600;
            color: var(--accent);
            font-size: 14px;
        }
        
        .message-time {
            font-size: 11px;
            color: var(--text-dim);
        }
        
        .message-text {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text);
            padding-left: 0;
        }
        
        /* Terminal style */
        [data-theme="irc"] .message,
        [data-theme="terminal"] .message,
        [data-theme="matrix"] .message {
            font-family: 'SF Mono', 'Consolas', 'Courier New', monospace;
        }
        
        [data-theme="irc"] .message::before {
            content: '<';
            color: var(--text-dim);
        }
        
        [data-theme="irc"] .message-author::after {
            content: '> ';
            color: var(--text-dim);
        }
        
        [data-theme="terminal"] .message::before {
            content: '$ ';
            color: var(--accent);
        }
        
        [data-theme="matrix"] .message {
            text-shadow: 0 0 5px var(--accent);
        }
        
        /* Input */
        .message-input {
            padding: 15px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
        }
        
        .input-wrapper input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn-send {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }
        
        /* Online users panel */
        .online-panel {
            width: 250px;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
        }
        
        .online-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 14px;
            color: var(--accent);
        }
        
        .online-count {
            font-size: 12px;
            color: var(--text-dim);
            margin-left: 10px;
        }
        
        .online-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .online-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .online-user:hover {
            background: rgba(255, 215, 0, 0.1);
        }
        
        .online-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #000;
            font-size: 14px;
        }
        
        .online-info {
            flex: 1;
        }
        
        .online-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .online-status {
            font-size: 11px;
            color: var(--online);
        }
        
        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--online);
            box-shadow: 0 0 5px var(--online);
        }
        
        /* User section */
        .user-section {
            padding: 15px;
            border-top: 1px solid var(--border);
        }
        
        .user-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #000;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .user-status {
            font-size: 12px;
            color: var(--online);
        }
        
        /* Auth modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            width: 400px;
            max-width: 90%;
            border: 1px solid var(--border);
        }
        
        .modal-title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn-submit {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }
        
        .modal-footer {
            text-align: center;
            margin-top: 15px;
            color: var(--text-dim);
            font-size: 14px;
        }
        
        .modal-footer a {
            color: var(--accent);
            text-decoration: none;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .online-panel {
                display: none;
            }
            .theme-bar {
                flex-wrap: wrap;
            }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>
<body data-theme="dark">
    <div class="theme-bar">
        <button class="btn-theme" onclick="toggleTheme()" id="themeBtn">🌙</button>
        <span style="color: var(--text-dim); font-size: 12px;">MWC Chat v1.0</span>
        <button class="btn-send" onclick="logout()" style="padding: 8px 15px; font-size: 12px; margin-left: auto;">Выход</button>
    </div>
    
    <style>
        .btn-theme {
            padding: 10px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-theme:hover {
            background: var(--accent);
            color: #000;
        }
    </style>
    
    <div class="container">
        <div class="main">
            <div class="chat-header">
                <div>
                    <div class="chat-title">#general</div>
                    <div class="chat-topic">Чат майнеров MWC</div>
                </div>
                <button class="btn-send" onclick="logout()" style="padding: 8px 15px; font-size: 12px;">Выход</button>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div class="message-input">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Напишите сообщение..." onkeypress="handleKeyPress(event)">
                    <button class="btn-send" onclick="sendMessage()">→</button>
                </div>
            </div>
        </div>
        
        <div class="online-panel">
            <div class="online-header">
                Онлайн<span class="online-count" id="onlineCount">(0)</span>
            </div>
            <div class="online-list" id="onlineList"></div>
            <div class="user-section">
                <div class="user-card" onclick="logout()">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Гость</div>
                        <div class="user-status" id="userStatus">В сети</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Вход в чат</div>
            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="authUsername" placeholder="Ваш ник" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="authPassword" placeholder="Пароль">
                </div>
                <button type="submit" class="btn-submit" id="authButton">Войти</button>
            </form>
            <div class="modal-footer">
                <span id="modalSwitch">Нет аккаунта? <a href="#" onclick="switchAuth()">Регистрация</a></span>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentUser = null;
        let messages = [];
        let users = {};
        let currentTheme = 'dark';
        
        // Initialize
        function init() {
            console.log('=== INIT ===');
            loadTheme();
            updateThemeButton();
            loadUsers();
            loadMessages();
            checkAuth();
            renderMessages();
            renderOnlineUsers();
            startPolling();
            console.log('=== INIT COMPLETE ===');
        }
        
        // Theme
        function loadTheme() {
            const saved = localStorage.getItem('mwc_theme');
            if (saved) {
                currentTheme = saved;
                document.body.dataset.theme = saved;
                document.getElementById('themeSelect').value = saved;
            }
        }
        
        function setTheme(theme) {
            currentTheme = theme;
            document.body.dataset.theme = theme;
            localStorage.setItem('mwc_theme', theme);
            updateThemeButton();
        }
        
        function toggleTheme() {
            if (currentTheme === 'dark') {
                setTheme('light');
            } else {
                setTheme('dark');
            }
        }
        
        function updateThemeButton() {
            const btn = document.getElementById('themeBtn');
            if (currentTheme === 'dark') {
                btn.textContent = '🌙';
            } else {
                btn.textContent = '☀️';
            }
        }
        
        // Load users
        function loadUsers() {
            const saved = localStorage.getItem('mwc_users');
            if (saved) {
                users = JSON.parse(saved);
            } else {
                users = {};
                saveUsers();
            }
        }
        
        function saveUsers() {
            localStorage.setItem('mwc_users', JSON.stringify(users));
        }
        
        // Load messages
        function loadMessages() {
            const saved = localStorage.getItem('mwc_messages');
            if (saved) {
                messages = JSON.parse(saved);
            } else {
                messages = [];
                saveMessages();
            }
        }
        
        function saveMessages() {
            localStorage.setItem('mwc_messages', JSON.stringify(messages));
        }
        
        // Auth
        function checkAuth() {
            console.log('=== CHECK AUTH ===');
            const saved = localStorage.getItem('mwc_currentUser');
            console.log('Saved user:', saved);
            if (saved) {
                currentUser = saved;
                if (users[currentUser]) {
                    users[currentUser].online = true;
                    saveUsers();
                }
                updateUserUI();
            } else {
                showAuthModal();
            }
        }
        
        function showAuthModal() {
            document.getElementById('authModal').classList.add('active');
        }
        
        function hideAuthModal() {
            document.getElementById('authModal').classList.remove('active');
        }
        
        function switchAuth() {
            const title = document.getElementById('modalTitle');
            const button = document.getElementById('authButton');
            const switchText = document.getElementById('modalSwitch');
            
            if (title.textContent === 'Вход в чат') {
                title.textContent = 'Регистрация';
                button.textContent = 'Создать аккаунт';
                switchText.innerHTML = 'Уже есть аккаунт? <a href="#" onclick="switchAuth()">Войти</a>';
            } else {
                title.textContent = 'Вход в чат';
                button.textContent = 'Войти';
                switchText.innerHTML = 'Нет аккаунта? <a href="#" onclick="switchAuth()">Регистрация</a>';
            }
        }
        
        function handleAuth(e) {
            e.preventDefault();
            
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            const isRegister = document.getElementById('modalTitle').textContent === 'Регистрация';
            
            if (!username) {
                alert('Введите имя пользователя');
                return;
            }
            
            if (isRegister) {
                if (users[username]) {
                    alert('Пользователь уже существует');
                    return;
                }
                
                users[username] = {
                    password: hashCode(password || '123'),
                    online: true,
                    avatar: username[0].toUpperCase()
                };
                saveUsers();
                
                currentUser = username;
                localStorage.setItem('mwc_currentUser', username);
                
                hideAuthModal();
                updateUserUI();
                renderOnlineUsers();
                
                addSystemMessage(`${username} присоединился к чату`);
            } else {
                if (!users[username]) {
                    alert('Пользователь не найден');
                    return;
                }
                
                if (users[username].password !== hashCode(password || '123')) {
                    alert('Неверный пароль');
                    return;
                }
                
                users[username].online = true;
                saveUsers();
                
                currentUser = username;
                localStorage.setItem('mwc_currentUser', username);
                
                hideAuthModal();
                updateUserUI();
                renderOnlineUsers();
            }
        }
        
        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
            }
            return hash.toString();
        }
        
        function updateUserUI() {
            if (currentUser) {
                document.getElementById('userName').textContent = currentUser;
                document.getElementById('userStatus').textContent = 'В сети';
                document.getElementById('userAvatar').textContent = currentUser[0].toUpperCase();
            } else {
                document.getElementById('userName').textContent = 'Гость';
                document.getElementById('userStatus').textContent = 'Не авторизован';
                document.getElementById('userAvatar').textContent = '?';
            }
        }
        
        function logout() {
            if (currentUser && users[currentUser]) {
                users[currentUser].online = false;
                saveUsers();
            }
            currentUser = null;
            localStorage.removeItem('mwc_currentUser');
            updateUserUI();
            showAuthModal();
        }
        
        function addMessage(user, text) {
            console.log('=== ADD MESSAGE ===');
            console.log('User:', user);
            console.log('Text:', text);
            
            if (!user || !text) {
                console.error('Invalid message - user or text is empty');
                return;
            }
            
            const newMsg = {
                user: user,
                text: text,
                time: Date.now()
            };
            
            messages.push(newMsg);
            console.log('Messages count:', messages.length);
            
            // Keep only last 100 messages
            if (messages.length > 100) {
                messages = messages.slice(-100);
            }
            
            saveMessages();
            renderMessages();
            console.log('=== MESSAGE ADDED ===');
        }
        
        function addSystemMessage(text) {
            messages.push({
                user: '⚠️ Система',
                text: text,
                time: Date.now()
            });
            saveMessages();
            renderMessages();
        }
        
        function renderMessages() {
            const container = document.getElementById('messages');
            if (!container) {
                console.error('Messages container not found!');
                return;
            }
            
            console.log('Rendering', messages.length, 'messages');
            
            container.innerHTML = messages.map(msg => {
                const avatar = (users[msg.user] && users[msg.user].avatar) || (msg.user && msg.user[0]) || '?';
                const time = new Date(msg.time).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                
                return `
                    <div class="message">
                        <div class="message-header">
                            <span class="message-author">${avatar} ${msg.user}</span>
                            <span class="message-time">${time}</span>
                        </div>
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                    </div>
                `;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
            console.log('Messages rendered');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function sendMessage() {
            console.log('sendMessage called, currentUser:', currentUser);
            
            if (!currentUser) {
                console.log('No currentUser, showing auth modal');
                showAuthModal();
                return;
            }
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            console.log('Message text:', text);
            
            if (!text) {
                console.log('Empty message, skipping');
                return;
            }
            
            console.log('Adding message from', currentUser, ':', text);
            addMessage(currentUser, text);
            input.value = '';
            console.log('Message sent successfully');
        }
        
        function handleKeyPress(e) {
            console.log('Key pressed:', e.key, 'currentUser:', currentUser);
            if (e.key === 'Enter') {
                console.log('Enter pressed, sending message');
                e.preventDefault();
                sendMessage();
            }
        }
        
        // Online users
        function renderOnlineUsers() {
            const list = document.getElementById('onlineList');
            const onlineUsers = Object.keys(users).filter(u => users[u].online);
            
            document.getElementById('onlineCount').textContent = `(${onlineUsers.length})`;
            
            list.innerHTML = onlineUsers.map(user => {
                const avatar = users[user].avatar || user[0];
                return `
                    <div class="online-user">
                        <div class="online-avatar">${avatar}</div>
                        <div class="online-info">
                            <div class="online-name">${user}</div>
                            <div class="online-status">В сети</div>
                        </div>
                        <div class="online-dot"></div>
                    </div>
                `;
            }).join('');
        }
        
        // Polling
        function startPolling() {
            setInterval(() => {
                loadMessages();
                loadUsers();
                renderMessages();
                renderOnlineUsers();
            }, 2000);
        }
        
        // Init
        init();
    </script>
</body>
</html>
