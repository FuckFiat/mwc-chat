<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fucking Miners — Admin Panel</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-card: #111111;
            --text: #ffffff;
            --text-dim: #888888;
            --accent: #FFD700;
            --border: rgba(255, 215, 0, 0.1);
            --online: #4caf50;
            --offline: #666;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        h1 {
            color: var(--accent);
            margin-bottom: 20px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 600;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--text-dim);
            margin-top: 5px;
        }
        
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 15px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        th {
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .online {
            color: var(--online);
        }
        
        .offline {
            color: var(--offline);
        }
        
        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover {
            background: var(--accent);
            color: #000;
        }
        
        button.danger {
            border-color: #ff4444;
        }
        
        button.danger:hover {
            background: #ff4444;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Назад в чат</a>
    
    <h1>⚡ Fucking Miners — Admin Panel</h1>
    
    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" id="totalUsers">0</div>
            <div class="stat-label">Пользователей</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="onlineUsers">0</div>
            <div class="stat-label">Онлайн</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalMessages">0</div>
            <div class="stat-label">Сообщений</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="avgMessages">0</div>
            <div class="stat-label">Среднее сообщений</div>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">Пользователи</div>
        <table>
            <thead>
                <tr>
                    <th>Ник</th>
                    <th>Статус</th>
                    <th>Сообщений</th>
                    <th>Последний визит</th>
                    <th>Регистрация</th>
                </tr>
            </thead>
            <tbody id="usersTable"></tbody>
        </table>
    </div>
    
    <div class="section">
        <div class="section-title">Последние сообщения</div>
        <table>
            <thead>
                <tr>
                    <th>Время</th>
                    <th>Пользователь</th>
                    <th>Сообщение</th>
                </tr>
            </thead>
            <tbody id="messagesTable"></tbody>
        </table>
    </div>
    
    <div class="actions">
        <button onclick="exportData()">📥 Экспорт данных</button>
        <button onclick="clearMessages()" class="danger">🗑 Очистить сообщения</button>
        <button onclick="clearAll()" class="danger">⚠️ Очистить всё</button>
    </div>

    <script>
        // Load data
        function loadData() {
            const users = JSON.parse(localStorage.getItem('fm_users') || '{}');
            const messages = JSON.parse(localStorage.getItem('fm_messages') || '[]');
            return { users, messages };
        }
        
        // Render stats
        function renderStats() {
            const { users, messages } = loadData();
            
            const totalUsers = Object.keys(users).length;
            const onlineUsers = Object.keys(users).filter(u => users[u].online).length;
            const totalMessages = messages.length;
            const avgMessages = totalUsers > 0 ? Math.round(totalMessages / totalUsers) : 0;
            
            document.getElementById('totalUsers').textContent = totalUsers;
            document.getElementById('onlineUsers').textContent = onlineUsers;
            document.getElementById('totalMessages').textContent = totalMessages;
            document.getElementById('avgMessages').textContent = avgMessages;
        }
        
        // Render users table
        function renderUsers() {
            const { users } = loadData();
            const table = document.getElementById('usersTable');
            
            const rows = Object.keys(users).map(username => {
                const user = users[username];
                const status = user.online ? 'Онлайн' : 'Офлайн';
                const statusClass = user.online ? 'online' : 'offline';
                const lastSeen = user.lastSeen ? new Date(user.lastSeen).toLocaleString('ru-RU') : '-';
                const createdAt = user.createdAt ? new Date(user.createdAt).toLocaleString('ru-RU') : '-';
                const messageCount = user.messageCount || 0;
                
                return `
                    <tr>
                        <td><strong>${username}</strong></td>
                        <td class="${statusClass}">${status}</td>
                        <td>${messageCount}</td>
                        <td>${lastSeen}</td>
                        <td>${createdAt}</td>
                    </tr>
                `;
            }).join('');
            
            table.innerHTML = rows;
        }
        
        // Render messages table
        function renderMessages() {
            const { messages } = loadData();
            const table = document.getElementById('messagesTable');
            
            const last20 = messages.slice(-20).reverse();
            
            const rows = last20.map(msg => {
                const time = new Date(msg.time).toLocaleString('ru-RU');
                const text = msg.text.substring(0, 50) + (msg.text.length > 50 ? '...' : '');
                
                return `
                    <tr>
                        <td>${time}</td>
                        <td><strong>${msg.user}</strong></td>
                        <td>${text}</td>
                    </tr>
                `;
            }).join('');
            
            table.innerHTML = rows;
        }
        
        // Export data
        function exportData() {
            const { users, messages } = loadData();
            const data = { users, messages, exportedAt: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `fucking-miners-backup-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // Clear messages
        function clearMessages() {
            if (confirm('Удалить все сообщения?')) {
                localStorage.setItem('fm_messages', '[]');
                renderStats();
                renderUsers();
                renderMessages();
            }
        }
        
        // Clear all
        function clearAll() {
            if (confirm('Удалить всех пользователей и сообщения?')) {
                localStorage.removeItem('fm_users');
                localStorage.removeItem('fm_messages');
                localStorage.removeItem('fm_currentUser');
                renderStats();
                renderUsers();
                renderMessages();
            }
        }
        
        // Init
        renderStats();
        renderUsers();
        renderMessages();
        
        // Auto-refresh
        setInterval(() => {
            renderStats();
            renderUsers();
            renderMessages();
        }, 2000);
    </script>
</body>
</html>
